<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Quote Generator</title>
</head>
<body>
    <h1>Dynamic Quote Generator</h1>
    
    <!-- Quote Display Section -->
    <div id="quoteDisplay"></div>
    
    <!-- Button to Show New Quote -->
    <button id="newQuote">Show New Quote</button>
    
    <!-- The form for adding new quotes will be dynamically inserted here -->
    <div id="addQuoteForm"></div>

    <!-- Export and Import functionality will be dynamically added by JavaScript -->
    <div id="importExportSection"></div>

    <script src="script.js"></script>
</body>
</html>
